[theme]
base = "dark"
primaryColor = "#FFAE35"
backgroundColor = "#000000"
secondaryBackgroundColor = "#0a0a0a"
textColor = "#ffffff"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = false
baseUrlPath = "/monitoramento"

[browser]
gatherUsageStats = false

[client]
# minimal esconde o botao "Deploy" e o menu hamburguer — apropriado
# para dashboard embutido via iframe na plataforma do advogado.
toolbarMode = "minimal"
showErrorDetails = "stacktrace"
